<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Green rounded square background -->
  <rect width="128" height="128" rx="28" fill="#16a34a"/>

  <!-- All content centered at (64,64), kept within safe circle r=48 for Google's circular crop -->
  <g>
    <!-- Racket head (oval) - centered higher, smaller -->
    <ellipse cx="64" cy="52" rx="24" ry="28" fill="none" stroke="white" stroke-width="5"/>

    <!-- Strings - horizontal (subtle) -->
    <line x1="43" y1="43" x2="85" y2="43" stroke="white" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>
    <line x1="40" y1="52" x2="88" y2="52" stroke="white" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>
    <line x1="43" y1="61" x2="85" y2="61" stroke="white" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>

    <!-- Strings - vertical (subtle) -->
    <line x1="53" y1="25" x2="53" y2="79" stroke="white" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>
    <line x1="64" y1="24" x2="64" y2="80" stroke="white" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>
    <line x1="75" y1="25" x2="75" y2="79" stroke="white" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>

    <!-- The Sweet Spot - prominent center dot with glow -->
    <circle cx="64" cy="52" r="10" fill="white" opacity="0.25"/>
    <circle cx="64" cy="52" r="6" fill="white"/>

    <!-- Handle - shorter to stay in safe zone -->
    <rect x="59" y="78" width="10" height="22" rx="4" fill="white"/>
  </g>
</svg>