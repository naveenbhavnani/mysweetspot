            - heading "About this item" [level=2] [ref=e646]
            - list [ref=e647]:
              - listitem [ref=e648]: "T700 RAW CARBON FIBRE: Advanced Carbon Friction Surface (CFS) combined with T700 RAW Carbon Fiber material in thie pickle ball racket, increases friction to maximise spin & ball control. CFS technology provides a more advanced, durable and longer lasting friction surface. Premium Carbon Fibre strengthens the paddle & provides a crisp feel with greater energy return."
              - listitem [ref=e649]: "ELONGATED HANDLE DESIGN: 5.6 inch extended handle provides increased reach and allows for two handed play using the pickleball paddle for better backhand shots."
              - listitem [ref=e650]: "HYPERFOAM EDGE WALLS: Hyperfoam injected edge walls enhances energy absorption and transfer of the pickle ball paddle, reducing hand vibrations and increasing comfort. The foam's elasticity improves dwell time for better control and spin, while its damping properties extend the sweet spot for more consistent power across the pickle ball racket"
              - listitem [ref=e651]: "THERMOFORMED UNIBODY CONSTRUCTION: The pickleball paddle is moulded into one piece with high-temperature and high-pressure treatment, eliminating looseness and gaps and enhancing the rackets stability and durability."
              - listitem [ref=e652]: "16 MM THICKNESS For Optimal Precison & Control: The 16mm thickness of this pickle ball racket allows for more precise shots with better finesse and control. The paddle's core provides a softer, more responsive feel, making it easier to place the ball accurately. Perfect for players who value precision and consistency in their shots."
              - listitem [ref=e653]: "NON-SLIP & SWEAT-WICKING GRIP: Seamless wrist rotation and powerful hits with our carbon pickle ball paddle, designed with an optimal grip size and carefully crafted ridged contours for a perfect ergonomic fit. With a non-slip synthetic leather grip and sweat-wicking perforations, FirstEdge is built to enhance your game with every hit."
              - listitem [ref=e654]: "PERFORMANCE CURVE HEAD: Unique Performance Curved Head is designed to improve your game. Curved head design of the pickleball racket reduces wind-resistance and increases swing speed."
              - listitem [ref=e655]: "POLYPROPYLENE HONEYCOMB CORE For Extra Durability & Performance: PP Honeycomb core minimizes vibration and enhances control. The honeycomb structure of this pickle ball racket compresses for improved feel, while the unique cell shape and material increase the paddle’s longevity."
