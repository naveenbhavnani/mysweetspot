                  - heading "Reviewed in India on 1 April 2023" [level=6] [ref=e1248]
                  - generic [ref=e1253]: I used to play with a carbonex 8000plus and astrox lite 27i, Upon seeing reviews about this racket from badminton racket review, i bought it from amazon and it comes unstrung as it states, i paired it with lining no-1 boost string at 26lbs, added an additional grip (original was too small), I can say that with good technique this racket performs very well. Power remains almost the same as astrox lite 27i, but control is much better with this racket. Defence as well improved as this is light weight racket. Can go for this racket if you prefer light weight rackets, otherwise having little heavier rackets like 3d calibar X combat or astrox 88d pro will give you much better smashing power if you like offensive game. However this racket is also not short of power at all provided we use the right technique. Good luck.
