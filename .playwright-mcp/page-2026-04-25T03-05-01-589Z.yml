          - heading "Product description" [level=2] [ref=e604]
          - paragraph [ref=e606]: Li-Ning Windstorm 79-S is the new top-notch Windstorm racket backed by Superlight technology. This racket is designed for superlight high power swings and features a soft shaft that requires less strength to generate power. The dynamic optimum frame is devised to reduce air drag to boost your strikes with consistent high-velocity hits. This gives players brisk motion control and fast swing speeds that directs all their force forward without any loss of momentum due to torsion. It allows you to generate a great amount of power if you hit the max string tension at 30 lbs. In case you are a player who is still developing badminton skills and racket swing techniques, this racket will provide great control and accuracy.
