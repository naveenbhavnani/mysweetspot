                      - generic [ref=e2089]:
                        - text: This is my 3rd purchase and I hit my shots decently since I'm playing from a long time. I had strung the first 2 racquets at 31 & 30 LBS respectively & the frame cracked at the top right corner. Why boast 38LBS capacity if it shows the weak point at 30LBS strength itself. Now I have strung it at 29LBS.
                        - text: There's no doubt that this racquet is one of the best at this price point in the market. The smashes are awesome and with right strings like BG65 titanium the back hand drops are easy and very controllable. The thin shaft reduces the air resistance a little inturn helping quick response. But the frame breaking at the same spot twice makes me wonder if the model has some kind of defect. Since each of them lasted at least 2 years, I am still going to keep purchasing them until they stop manufacturing this model. Thanks APACS.
