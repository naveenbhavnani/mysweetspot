            - heading "About this item" [level=2] [ref=e654]
            - list [ref=e655]:
              - listitem [ref=e656]: "USAPA APPROVED PREMIUM PROPULSION CORE TECHNOLOGY (GEN3 UPGRADED): Packed with upgraded gen3 technology, this pickle ball paddle has an advanced structure with a dual hyperfoam edge wall which absorbs energy very efficiently, thus significantly increasing the power & pop of the racket & reducing misshits while enhancing the sweet spot thus ensuring an extremely confident feel with our pickle ball racket."
              - listitem [ref=e657]: 45° CARBON FRICTION SURFACE(CFS) – Engineered Spin Like Never Before Experience next-level spin and control with our 45° Forced Carbon Friction Surface, powered by T700 Raw Carbon Fiber. This advanced surface orientation is precision-engineered at a 45-degree angle to maximize friction on ball contact — delivering up to 15% more spin than standard carbon fiber pickleball paddles. Unlike sandpainted surfaces that wear down over time, our RAW carbon face of this pickleball racket uses a naturally textured weave, ensuring durability, long-lasting grit, and consistent performance. The result? Elite-level spin, superior ball control, and unmatched surface longevity
              - listitem [ref=e658]: JAPANESE TORAY T700 RAW CARBON FIBRE BUILD:The Japanese Carbon Fibre improves the strength & durability of the paddle racket & provides a crisp feel with greater energy return.
              - listitem [ref=e659]: "DUAL HYPERFOAM EDGE WALLS: Hyperfoam injected edge walls enhances energy absorption and transfer throughout the pickleball racket, reducing hand vibrations and increasing comfort. The foam's elasticity improves dwell time for better control and spin, while its damping properties extend the sweet spot for more consistent power"
              - listitem [ref=e660]: "ADVANCED THERMOFORMED & UNIBODY CONSTRUCTION: The pickleball racket uses an advance process of construction where the racket is bound together via thermoforming & the internal PP HoneyComb Core is cold pressed to ensure its core doesn't crumble thus increasing long term durability of the racket. The pickle ball racket is finally moulded into one piece with high-temperature and high-pressure treatment, eliminating looseness and gaps and enhancing the rackets stability and durability."
              - listitem [ref=e661]: "16 MM THICKNESS FOR OPTIMAL PRECISION & CONTROL: The 16mm thickness allows for more precise shots with better finesse and control. The racket provides a more responsive feel, thus making it easier to place the ball accurately. Perfect for players who value precision and consistency in their shots."
              - listitem [ref=e662]: "ELONGATED HANDLE DESIGN: 5.5 inch extended handle of this pickle ball racket provides increased reach and allows for two handed play for better backhand shots."
              - listitem [ref=e663]: "NON-SLIP & SWEAT-WICKING GRIP: Seamless wrist rotation and powerful hits with our carbon pickleball paddle, designed with an optimal grip size and carefully crafted ridged contours for a perfect ergonomic fit. With a non-slip synthetic leather grip and sweat-wicking perforations, FirstEdge is built to enhance your game with every hit."
