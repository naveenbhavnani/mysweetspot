          - paragraph [ref=e967]: HEAD G. 110 Squash Racquet is made with the Titanium and Graphite composition, which provides the racquet with the robust structure without increasing the weight of the racquet. It offers excellent manoeuvrability and power. The HEAD franchise has integrated Head G. 110 with Intelfibre Technology, which provides the racquet with more stiffness. Intelfibre Technology also helps reduce as much as 20% of the vibration feedback when the ball hits the racquet strings, which ultimately improves the accuracy of the shots. The HEAD G. 110 has the Power Frame Technology, which delivers firm grip and resilience. Besides, the Head franchise has also incorporated the Head G. 110 racquet with its signature Power Pattern Technology, which not only expands the Sweet Spot but also boosts the power and control of the racquet.
