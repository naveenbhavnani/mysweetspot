                    - text: My earlier rackets we all heavier than this, about 135-160 gms. The advantage was that off center shots did not twist the racket as much as they twist this. This is a gripe that should be common between early intermediates. Otherwise, shots that connect have great power and the racket is infact very evenly balanced. I use two over grips to give me a firmer grip which may have also affected the balance. Good racket if you are already a good player.
                    - text: EDIT - String broke on 3rd of December, 3 weeks after i brought it.
