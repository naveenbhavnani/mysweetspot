                        - text: Perfect racket for me
                    - heading "Reviewed in India on 5 March 2025" [level=6] [ref=e1614]
                    - generic [ref=e1615]:
                      - generic [ref=e1616]:
                        - text: "Colour: Navy/Blue/Gold"
