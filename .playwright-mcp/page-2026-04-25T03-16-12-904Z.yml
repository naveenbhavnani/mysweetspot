          - heading "Product description" [level=2] [ref=e902]
          - paragraph [ref=e904]: Great for beginning and casual players alike, the Pro Staff Precision XL 110 delivers exceptional performance at an incredible value. It has an aluminum alloy frame that is a heavier weight but still easy to swing and maneuver. Together with its oversized head, this racket generates plenty of power with a large sweet spot that provides extra margin for error on strokes that miss the center of the string bed. Stable and durable with a longer length to extend court coverage and give players more time to make a play on the next ball, this is the only racket casual and new players need to feel successful on the court.
